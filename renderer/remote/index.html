<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1b1b19" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Yan Agent Remote</title>
  <link rel="icon" href="/assets/logo-light.png" />
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="agent-output.css" />
</head>
<body>
  <div id="app" class="app">
    <section id="gateView" class="view gate-view">
      <div class="gate-card">
        <div class="brand-logo" aria-hidden="true">
          <img src="/assets/logo-light.png" alt="" width="56" height="56" />
        </div>
        <h1>Yan Agent</h1>
        <p class="gate-sub">手机遥控桌面 Agent</p>
        <label class="field">
          <span>访问密码</span>
          <input id="passwordInput" type="password" inputmode="text" autocomplete="current-password" placeholder="在电脑端设置中配置" minlength="4" />
        </label>
        <button id="connectBtn" class="btn primary" type="button">进入</button>
        <p id="gateError" class="error hidden"></p>
        <p class="gate-hint">请确保手机与电脑在同一 Wi‑Fi</p>
      </div>
    </section>

    <section id="listView" class="view list-view hidden">
      <header class="topbar">
        <div class="topbar-brand">
          <img src="/assets/logo-light.png" alt="" width="28" height="28" class="topbar-logo" />
          <div>
            <h2>Yan Agent</h2>
            <p id="connLabel" class="muted">已连接</p>
          </div>
        </div>
        <button id="newChatBtn" class="icon-btn" type="button" title="新建任务" aria-label="新建任务">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </header>
      <div class="list-tools">
        <label class="search-field" for="sessionSearch">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="sessionSearch" type="search" placeholder="搜索任务" autocomplete="off" />
        </label>
      </div>
      <div id="sessionList" class="session-list"></div>
    </section>

    <section id="chatView" class="view chat-view hidden">
      <header class="topbar chat-topbar">
        <button id="backBtn" class="icon-btn" type="button" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="chat-title-wrap">
          <h2 id="chatTitle">对话</h2>
          <div class="chat-meta-row">
            <p id="chatStatus" class="muted">就绪</p>
            <button id="chatModelBtn" class="chat-model-btn" type="button" aria-haspopup="dialog" aria-controls="modelPickerOverlay" title="切换模型">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M9 9h6v6H9z"/></svg>
              <span id="chatModelName">未选择模型</span>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m7 10 5 5 5-5"/></svg>
            </button>
          </div>
        </div>
        <button id="chatActionsBtn" class="icon-btn" type="button" title="任务操作" aria-label="任务操作">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
        </button>
      </header>
      <div id="messageList" class="message-list"></div>
      <form id="composerForm" class="composer" autocomplete="off">
        <div id="composerAttachments" class="composer-attachments hidden"></div>
        <div class="composer-row">
          <button id="attachImageBtn" class="composer-image-btn" type="button" title="上传图片" aria-label="上传图片">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/><path d="M17 3v5M14.5 5.5h5"/></svg>
          </button>
          <input id="imageInput" type="file" accept="image/*" multiple hidden>
          <textarea id="composerInput" rows="1" placeholder="发送指令给 Agent…" enterkeyhint="send"></textarea>
          <button id="sendBtn" class="send-btn" type="submit" aria-label="发送" disabled>
            <svg class="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 19V5M6 11l6-6 6 6"/></svg>
            <svg class="stop-icon hidden" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
          </button>
        </div>
      </form>
    </section>

    <div id="modelPickerOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modelPickerTitle">
      <section class="bottom-sheet model-sheet">
        <div class="sheet-handle" aria-hidden="true"></div>
        <h2 id="modelPickerTitle">切换模型</h2>
        <p id="modelProviderLabel" class="model-provider"></p>
        <div id="modelList" class="model-list"></div>
        <button class="sheet-cancel" data-close-modal="modelPickerOverlay" type="button">取消</button>
      </section>
    </div>

    <div id="taskMenuOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="taskMenuTitle">
      <section class="bottom-sheet">
        <div class="sheet-handle" aria-hidden="true"></div>
        <h2 id="taskMenuTitle">任务操作</h2>
        <button id="pinTaskBtn" class="sheet-action" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 17v5M5 17h14M6 3h12l-2 7 3 3H5l3-3z"/></svg>
          <span>置顶任务</span>
        </button>
        <button id="renameTaskBtn" class="sheet-action" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          <span>重命名任务</span>
        </button>
        <button id="deleteTaskBtn" class="sheet-action danger" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
          <span>删除任务</span>
        </button>
        <button class="sheet-cancel" data-close-modal="taskMenuOverlay" type="button">取消</button>
      </section>
    </div>

    <div id="renameOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="renameTitle">
      <section class="bottom-sheet form-sheet">
        <div class="sheet-handle" aria-hidden="true"></div>
        <h2 id="renameTitle">重命名任务</h2>
        <input id="renameInput" class="sheet-input" type="text" maxlength="80" autocomplete="off" />
        <div class="sheet-buttons">
          <button class="sheet-cancel" data-close-modal="renameOverlay" type="button">取消</button>
          <button id="confirmRenameBtn" class="sheet-confirm" type="button">保存</button>
        </div>
      </section>
    </div>

    <div id="deleteOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
      <section class="bottom-sheet form-sheet">
        <div class="sheet-handle" aria-hidden="true"></div>
        <h2 id="deleteTitle">删除任务？</h2>
        <p id="deleteDescription" class="sheet-description"></p>
        <div class="sheet-buttons">
          <button class="sheet-cancel" data-close-modal="deleteOverlay" type="button">取消</button>
          <button id="confirmDeleteBtn" class="sheet-confirm danger" type="button">删除</button>
        </div>
      </section>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  </div>
  <script src="agent-output.js"></script>
  <script src="app.js"></script>
</body>
</html>
